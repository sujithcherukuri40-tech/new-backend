<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pavaman Drone Live Map - Real-time 3D Telemetry">
    <title>Pavaman Drone Map</title>
    
    <!-- CesiumJS 1.120 - Using Open Source (no Ion required) -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.120/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Cesium 3D Globe Container -->
    <div id="cesiumContainer"></div>
    
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Initializing 3D Map...</div>
        <div class="loading-subtext">Loading terrain and imagery</div>
    </div>

    <!-- View Mode Indicator (shows briefly when changed) -->
    <div id="viewModeIndicator" class="view-mode-indicator">
        <span class="mode-icon">&#8595;</span>
        <span class="mode-label">Top-Down View</span>
    </div>

    <!-- View Mode Buttons -->
    <div class="view-mode-buttons" id="viewModeButtons">
        <button class="view-btn active" onclick="setViewModeUI('topdown')" id="btn-topdown">
            <span class="icon">&#8595;</span>
            <span>Top Down</span>
        </button>
        <button class="view-btn" onclick="setViewModeUI('chase3d')" id="btn-chase3d">
            <span class="icon">&#9654;</span>
            <span>3D Chase</span>
        </button>
        <button class="view-btn" onclick="setViewModeUI('free')" id="btn-free">
            <span class="icon">&#9678;</span>
            <span>Free Roam</span>
        </button>
    </div>

    <!-- Map Controls (Left Side) -->
    <div class="map-controls" id="mapControls">
        <button class="control-btn" onclick="zoomIn()" title="Zoom In">+</button>
        <button class="control-btn" onclick="zoomOut()" title="Zoom Out">&#8722;</button>
        <div class="control-divider"></div>
        <button class="control-btn" onclick="centerOnDrone(true)" title="Center on Drone (C)">&#8853;</button>
        <button class="control-btn" onclick="toggleFollowUI()" id="btn-follow" title="Toggle Follow (F)">&#9678;</button>
        <div class="control-divider"></div>
        <button class="control-btn" onclick="resetView()" title="Reset View (H)">&#8962;</button>
        <button class="control-btn" onclick="clearFlightPath()" title="Clear Path">&#9249;</button>
    </div>

    <!-- Keyboard Shortcuts Help -->
    <div class="shortcuts-tooltip" id="shortcutsTooltip">
        <h4>Keyboard Shortcuts</h4>
        <div class="shortcut-row">
            <span class="shortcut-key">1</span>
            <span class="shortcut-desc">Top-Down View</span>
        </div>
        <div class="shortcut-row">
            <span class="shortcut-key">2</span>
            <span class="shortcut-desc">3D Chase View</span>
        </div>
        <div class="shortcut-row">
            <span class="shortcut-key">3</span>
            <span class="shortcut-desc">Free Roam</span>
        </div>
        <div class="shortcut-row">
            <span class="shortcut-key">F</span>
            <span class="shortcut-desc">Toggle Follow</span>
        </div>
        <div class="shortcut-row">
            <span class="shortcut-key">C</span>
            <span class="shortcut-desc">Center on Drone</span>
        </div>
        <div class="shortcut-row">
            <span class="shortcut-key">H</span>
            <span class="shortcut-desc">Go to Home</span>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // UI Helper Functions
        var currentViewModeUI = 'topdown';
        var isFollowingUI = true;

        function setViewModeUI(mode) {
            currentViewModeUI = mode;
            
            // Update button states
            document.querySelectorAll('.view-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            document.getElementById('btn-' + mode).classList.add('active');
            
            // Show indicator with Unicode symbols
            var indicator = document.getElementById('viewModeIndicator');
            var labels = {
                'topdown': { icon: '\u2193', label: 'Top-Down View' },
                'chase3d': { icon: '\u25B6', label: '3D Chase View' },
                'free': { icon: '\u25CE', label: 'Free Roam' },
                'fpv': { icon: '\u25C9', label: 'First Person View' }
            };
            
            indicator.querySelector('.mode-icon').textContent = labels[mode].icon;
            indicator.querySelector('.mode-label').textContent = labels[mode].label;
            indicator.classList.add('visible');
            
            setTimeout(function() {
                indicator.classList.remove('visible');
            }, 2000);
            
            // Call the actual view mode function
            if (typeof setViewMode === 'function') {
                setViewMode(mode);
            }
        }

        function toggleFollowUI() {
            isFollowingUI = !isFollowingUI;
            var btn = document.getElementById('btn-follow');
            
            if (isFollowingUI) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            
            if (typeof toggleFollow === 'function') {
                toggleFollow();
            }
        }

        // Show shortcuts on hover over ? button
        document.addEventListener('keydown', function(e) {
            if (e.key === '?') {
                var tooltip = document.getElementById('shortcutsTooltip');
                tooltip.classList.toggle('visible');
            }
        });

        // Handle view mode changes from keyboard
        document.addEventListener('keydown', function(e) {
            if (e.key === '1') setViewModeUI('topdown');
            if (e.key === '2') setViewModeUI('chase3d');
            if (e.key === '3' || e.key === '4') setViewModeUI('free');
            if (e.key.toLowerCase() === 'f') {
                toggleFollowUI();
            }
        });
    </script>
</body>
</html>
